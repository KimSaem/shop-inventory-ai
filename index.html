<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="public/manifest.webmanifest" />
  <link rel="stylesheet" href="public/styles.css" />
  <title>가게 재고 AI</title>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <div class="eyebrow">Shop Inventory AI</div>
        <h1>가게 재고 AI</h1>
        <p id="statusText">시스템 준비 중</p>
      </div>
      <div class="header-actions">
        <span class="status-badge" id="connectionBadge">확인 중</span>
        <button class="icon-btn" id="refreshBtn" type="button" aria-label="새로고침" title="새로고침">↻</button>
      </div>
    </header>

    <section class="hero-panel">
      <div>
        <div class="section-label">오늘 주문</div>
        <p class="hero-copy">수량을 조정하고 저장하면, 다음 주문부터 AI가 최근 기록과 요일 패턴을 반영해 예측합니다.</p>
      </div>
      <div class="hero-actions">
        <button class="btn primary" id="copyBtn" type="button">문자용 복사</button>
        <button class="btn" id="shareBtn" type="button">공유</button>
        <button class="btn success" id="saveRecordBtn" type="button">오늘 저장/학습</button>
        <button class="btn" id="applyPredictBtn" type="button">AI 예측 적용</button>
      </div>
    </section>

    <section class="metrics-grid" aria-label="재고 요약">
      <div class="metric-card">
        <span>주문 품목</span>
        <strong id="orderItemCount">0</strong>
      </div>
      <div class="metric-card">
        <span>총 수량</span>
        <strong id="orderUnitCount">0</strong>
      </div>
      <div class="metric-card">
        <span>학습 기록</span>
        <strong id="recordsCount">0</strong>
      </div>
      <div class="metric-card">
        <span>AI 신뢰도</span>
        <strong id="confidenceText">시작</strong>
      </div>
    </section>

    <section class="workspace-grid">
      <div class="main-column">
        <section class="tool-panel">
          <div class="search-wrap">
            <input id="searchInput" type="search" placeholder="품목 검색" autocomplete="off" />
          </div>
          <select id="categoryFilter" aria-label="카테고리 필터">
            <option value="all">전체 카테고리</option>
          </select>
          <button class="btn" id="toggleZeroBtn" type="button">0개 숨김</button>
          <button class="btn" id="undoBtn" type="button">되돌리기</button>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="카테고리 빠른 선택"></nav>

        <section id="inventory" class="inventory" aria-label="재고 리스트"></section>
      </div>

      <aside class="side-column">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>AI 추천</h2>
              <p id="predictionSubtext">학습 기록이 쌓이면 추천이 정교해집니다.</p>
            </div>
            <span class="small-pill" id="predictedCount">0</span>
          </div>
          <div class="recommendation-list" id="recommendationList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>복사 미리보기</h2>
              <p id="lastRecord">마지막 학습 없음</p>
            </div>
            <button class="btn small" id="downloadBtn" type="button">백업</button>
          </div>
          <textarea id="messageOutput" readonly></textarea>
        </section>

        <section class="panel">
          <h2>품목 추가</h2>
          <div class="add-form">
            <input id="newItemName" type="text" placeholder="새 품목 이름" />
            <select id="newItemCategory"></select>
            <button class="btn" id="addItemBtn" type="button">추가</button>
          </div>
          <p class="form-hint">새 품목은 1개로 바로 추가되고 해당 카테고리로 이동합니다.</p>
        </section>
      </aside>
    </section>
  </main>

  <nav class="bottom-bar">
    <button class="btn danger" id="zeroAllBtn" type="button">전체 0으로</button>
    <button class="btn" id="restoreBtn" type="button">기본 리스트 복구</button>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="public/app.js" defer></script>
</body>
</html>
